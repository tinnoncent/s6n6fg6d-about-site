<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S6N6FG6D • TRANSMISSION</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Atmospheric layers -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="grain" id="grain"></div>

  <!-- Rainbow light projections -->
  <div class="rainbow-band band-a"></div>
  <div class="rainbow-band band-b"></div>
  <div class="rainbow-band band-c"></div>

  <!-- Floating dust / particles -->
  <canvas id="particles" class="particles"></canvas>

  <!-- Header / Transmission status -->
  <header class="header">
    <div class="transmission-status">
      <div class="status-indicator">
        <div class="status-dot"></div>
        <div class="status-glow"></div>
      </div>
      <div class="status-text">
        <span class="status-label">TRANSMISSION ACTIVE</span>
        <span class="status-channel">CHANNEL 06:66</span>
      </div>
    </div>
  </header>

  <!-- Main content -->
  <main class="main">
    <!-- Centerpiece: Abstract Occult Machine -->
    <div class="centerpiece">
      <svg id="occult-machine" width="720" height="720" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- White-hot neon glow -->
          <filter id="glow-white" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Emerald internal glow -->
          <filter id="glow-emerald" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Cyan fringe -->
          <filter id="glow-cyan" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Magenta fringe -->
          <filter id="glow-magenta" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>

          <!-- Core bloom -->
          <filter id="core-bloom" x="-300%" y="-300%" width="700%" height="700%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="bloom"/>
            <feMerge>
              <feMergeNode in="bloom"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Subtle outer geometry ring -->
        <g id="outer-geometry" opacity="0.35">
          <circle cx="400" cy="400" r="355" stroke="#E6D6B0" stroke-width="1"/>
          <circle cx="400" cy="400" r="335" stroke="#E6D6B0" stroke-width="0.6" stroke-dasharray="2 18"/>
        </g>

        <!-- Main structural rings -->
        <g id="structural-rings">
          <!-- Outer tube ring -->
          <circle cx="400" cy="400" r="268" stroke="#ffffff" stroke-width="7" stroke-linecap="round" filter="url(#glow-white)" opacity="0.95"/>
          <circle cx="400" cy="400" r="268" stroke="#0a3a2a" stroke-width="3.5" opacity="0.6"/>

          <!-- Mid ring -->
          <circle cx="400" cy="400" r="192" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-white)" opacity="0.9"/>
          <circle cx="400" cy="400" r="192" stroke="#0a3a2a" stroke-width="2.8" opacity="0.5"/>

          <!-- Inner ring -->
          <circle cx="400" cy="400" r="118" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" filter="url(#glow-white)" opacity="0.85"/>
        </g>

        <!-- Emerald internal structures -->
        <g id="emerald-structures" opacity="0.75">
          <circle cx="400" cy="400" r="255" stroke="#00ff9d" stroke-width="2.2" filter="url(#glow-emerald)"/>
          <circle cx="400" cy="400" r="178" stroke="#00ff9d" stroke-width="1.8" filter="url(#glow-emerald)"/>
          <circle cx="400" cy="400" r="105" stroke="#00ff9d" stroke-width="1.5" filter="url(#glow-emerald)"/>
        </g>

        <!-- Sacred geometric transmission array - 6-fold symmetry -->
        <g id="transmission-array">
          <!-- Radiating conduit tubes -->
          <g id="conduits">
            <!-- Top -->
            <path d="M400 145 Q400 95 400 52" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 145 Q400 95 400 52" stroke="#00ff9d" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>

            <!-- Top-right -->
            <path d="M400 145 Q465 175 532 115" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 145 Q465 175 532 115" stroke="#00ff9d" stroke-width="2.2" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>

            <!-- Bottom-right -->
            <path d="M400 655 Q465 625 532 685" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 655 Q465 625 532 685" stroke="#00ff9d" stroke-width="2.2" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>

            <!-- Bottom -->
            <path d="M400 655 Q400 705 400 748" stroke="#ffffff" stroke-width="6" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 655 Q400 705 400 748" stroke="#00ff9d" stroke-width="2.5" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>

            <!-- Bottom-left -->
            <path d="M400 655 Q335 625 268 685" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 655 Q335 625 268 685" stroke="#00ff9d" stroke-width="2.2" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>

            <!-- Top-left -->
            <path d="M400 145 Q335 175 268 115" stroke="#ffffff" stroke-width="5.5" stroke-linecap="round" filter="url(#glow-white)"/>
            <path d="M400 145 Q335 175 268 115" stroke="#00ff9d" stroke-width="2.2" stroke-linecap="round" filter="url(#glow-emerald)" opacity="0.7"/>
          </g>

          <!-- Intersection nodes / ports -->
          <g id="nodes">
            <circle cx="400" cy="145" r="11" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="400" cy="145" r="6" fill="#0a2a1f"/>
            <circle cx="400" cy="145" r="3.5" fill="#00ff9d" filter="url(#glow-emerald)"/>

            <circle cx="532" cy="115" r="9" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="532" cy="115" r="5" fill="#0a2a1f"/>
            <circle cx="532" cy="115" r="2.8" fill="#00ff9d" filter="url(#glow-emerald)"/>

            <circle cx="532" cy="685" r="9" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="532" cy="685" r="5" fill="#0a2a1f"/>
            <circle cx="532" cy="685" r="2.8" fill="#00ff9d" filter="url(#glow-emerald)"/>

            <circle cx="400" cy="655" r="11" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="400" cy="655" r="6" fill="#0a2a1f"/>
            <circle cx="400" cy="655" r="3.5" fill="#00ff9d" filter="url(#glow-emerald)"/>

            <circle cx="268" cy="685" r="9" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="268" cy="685" r="5" fill="#0a2a1f"/>
            <circle cx="268" cy="685" r="2.8" fill="#00ff9d" filter="url(#glow-emerald)"/>

            <circle cx="268" cy="115" r="9" fill="#ffffff" filter="url(#glow-white)"/>
            <circle cx="268" cy="115" r="5" fill="#0a2a1f"/>
            <circle cx="268" cy="115" r="2.8" fill="#00ff9d" filter="url(#glow-emerald)"/>
          </g>
        </g>

        <!-- Chromatic fringe layers (subtle offset for premium aberration) -->
        <g id="chromatic-fringe-cyan" opacity="0.22">
          <circle cx="403" cy="398" r="268" stroke="#00f0ff" stroke-width="4" filter="url(#glow-cyan)"/>
          <circle cx="403" cy="398" r="192" stroke="#00f0ff" stroke-width="3" filter="url(#glow-cyan)"/>
          <path d="M403 143 Q403 93 403 50" stroke="#00f0ff" stroke-width="4" stroke-linecap="round" filter="url(#glow-cyan)"/>
          <path d="M403 143 Q468 173 535 113" stroke="#00f0ff" stroke-width="3.5" stroke-linecap="round" filter="url(#glow-cyan)"/>
        </g>

        <g id="chromatic-fringe-magenta" opacity="0.18">
          <circle cx="397" cy="402" r="268" stroke="#ff00aa" stroke-width="4" filter="url(#glow-magenta)"/>
          <circle cx="397" cy="402" r="192" stroke="#ff00aa" stroke-width="3" filter="url(#glow-magenta)"/>
          <path d="M397 147 Q397 97 397 54" stroke="#ff00aa" stroke-width="4" stroke-linecap="round" filter="url(#glow-magenta)"/>
          <path d="M397 147 Q332 177 265 117" stroke="#ff00aa" stroke-width="3.5" stroke-linecap="round" filter="url(#glow-magenta)"/>
        </g>

        <!-- Central core with breathing energy -->
        <g id="core-assembly">
          <!-- Outer core shell -->
          <circle cx="400" cy="400" r="52" fill="none" stroke="#ffffff" stroke-width="2.5" filter="url(#glow-white)" opacity="0.6"/>
          
          <!-- Living core -->
          <circle cx="400" cy="400" r="32" fill="#ffffff" filter="url(#core-bloom)" opacity="0.95"/>
          <circle cx="400" cy="400" r="32" fill="#0a2a1f" opacity="0.85"/>
          <circle cx="400" cy="400" r="19" fill="#ffffff" filter="url(#glow-white)" opacity="0.9"/>
          <circle cx="400" cy="400" r="11" fill="#00ff9d" filter="url(#glow-emerald)"/>
          <circle cx="400" cy="400" r="5" fill="#ffffff"/>
        </g>

        <!-- Delicate inner geometric lattice -->
        <g id="inner-lattice" opacity="0.55">
          <polygon points="400,400 400,400" fill="none"/>
          <!-- Hexagonal lattice lines -->
          <path d="M400 282 L400 518" stroke="#E6D6B0" stroke-width="0.8"/>
          <path d="M282 400 L518 400" stroke="#E6D6B0" stroke-width="0.8"/>
          <path d="M318 318 L482 482" stroke="#E6D6B0" stroke-width="0.8"/>
          <path d="M482 318 L318 482" stroke="#E6D6B0" stroke-width="0.8"/>
          
          <!-- Small accent nodes on lattice -->
          <circle cx="400" cy="282" r="3" fill="#00ff9d" filter="url(#glow-emerald)"/>
          <circle cx="400" cy="518" r="3" fill="#00ff9d" filter="url(#glow-emerald)"/>
          <circle cx="282" cy="400" r="3" fill="#00ff9d" filter="url(#glow-emerald)"/>
          <circle cx="518" cy="400" r="3" fill="#00ff9d" filter="url(#glow-emerald)"/>
        </g>
      </svg>
    </div>

    <!-- Logo -->
    <div class="logo">
      <!-- Left star (neon tubing style from reference) -->
      <svg class="logo-star left" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="star-glow-white" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="star-glow-emerald" x="-200%" y="-200%" width="500%" height="500%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="3.8" result="b"/>
            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Outer white-hot tubing -->
        <path d="M24 2 L30 16 L45 18.5 L33.5 29 L36.5 44 L24 35.5 L11.5 44 L14.5 29 L3 18.5 L18 16 Z" 
              fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" filter="url(#star-glow-white)"/>
        <!-- Emerald inner glow tubing -->
        <path d="M24 6 L28.5 17 L41 19 L31.5 28 L34 40 L24 33 L14 40 L16.5 28 L7 19 L19.5 17 Z" 
              fill="none" stroke="#00ff9d" stroke-width="2.2" stroke-linejoin="round" filter="url(#star-glow-emerald)" opacity="0.85"/>
        <!-- Core highlight -->
        <path d="M24 9 L27 16.5 L37 18 L30 26 L32 36 L24 30.5 L16 36 L18 26 L11 18 L21 16.5 Z" 
              fill="none" stroke="#ffffff" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
      </svg>

      <span class="logo-text">𝖘6𝖓6𝖋𝖌6𝖉</span>

      <!-- Right star -->
      <svg class="logo-star right" width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M24 2 L30 16 L45 18.5 L33.5 29 L36.5 44 L24 35.5 L11.5 44 L14.5 29 L3 18.5 L18 16 Z" 
              fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round" filter="url(#star-glow-white)"/>
        <path d="M24 6 L28.5 17 L41 19 L31.5 28 L34 40 L24 33 L14 40 L16.5 28 L7 19 L19.5 17 Z" 
              fill="none" stroke="#00ff9d" stroke-width="2.2" stroke-linejoin="round" filter="url(#star-glow-emerald)" opacity="0.85"/>
        <path d="M24 9 L27 16.5 L37 18 L30 26 L32 36 L24 30.5 L16 36 L18 26 L11 18 L21 16.5 Z" 
              fill="none" stroke="#ffffff" stroke-width="1" stroke-linejoin="round" opacity="0.6"/>
      </svg>
    </div>

    <!-- Tagline -->
    <div class="tagline">
      CORRUPTED GOODS FOR DAMAGED FREQUENCIES.
    </div>

    <!-- Navigation destination cards -->
    <div class="nav-grid">
      <a href="#" class="nav-card" data-destination="violent-icon">
        <div class="card-inner">
          <div class="card-label">VIOLENT ICON</div>
          <div class="card-glow"></div>
        </div>
      </a>

      <a href="#" class="nav-card" data-destination="cosmonauta-vision">
        <div class="card-inner">
          <div class="card-label">COSMONAUTA VISION</div>
          <div class="card-glow"></div>
        </div>
      </a>

      <a href="#" class="nav-card" data-destination="ikonic-haus">
        <div class="card-inner">
          <div class="card-label">IKONIC HAUS</div>
          <div class="card-glow"></div>
        </div>
      </a>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
