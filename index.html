<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="s6n6fg6d — Corrupted Goods for Damaged Frequencies. An unknown transmission.">
  <title>s6n6fg6d — Corrupted Goods for Damaged Frequencies</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Background Layers -->
  <div class="bg-vignette"></div>
  <div class="bg-scanlines"></div>
  <canvas id="grain-canvas" class="bg-grain"></canvas>

  <!-- Main Content -->
  <main class="site-main">
    <!-- Hero / Transmission -->
    <section class="hero" id="hero">
      <div class="hero-inner">
        <!-- Custom Transmission Sigil -->
        <div class="sigil-container" aria-hidden="true">
          <svg id="sigil" width="520" height="520" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Neon Bloom / Glow -->
              <filter id="neon-glow" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="coloredBlur"/>
                <feMerge>
                  <feMergeNode in="coloredBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
              <filter id="core-glow" x="-150%" y="-150%" width="400%" height="400%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="4.5" result="coreBlur"/>
                <feMerge>
                  <feMergeNode in="coreBlur"/>
                  <feMergeNode in="SourceGraphic"/>
                </feMerge>
              </filter>
            </defs>

            <!-- Outer Ring + Ticks -->
            <g id="outer-group" class="rotating-slow">
              <circle cx="300" cy="300" r="248" fill="none" stroke="#00FF9C" stroke-width="1.25" opacity="0.55"/>
              <!-- 12 Analog Ticks -->
              <g id="outer-ticks">
                <!-- 0° -->
                <line x1="300" y1="52" x2="300" y2="72" stroke="#00FF9C" stroke-width="2.5" stroke-linecap="round"/>
                <!-- 30° -->
                <line x1="424" y1="88" x2="412" y2="104" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 60° -->
                <line x1="492" y1="176" x2="474" y2="188" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 90° -->
                <line x1="548" y1="300" x2="528" y2="300" stroke="#00FF9C" stroke-width="2.5" stroke-linecap="round"/>
                <!-- 120° -->
                <line x1="492" y1="424" x2="474" y2="412" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 150° -->
                <line x1="424" y1="512" x2="412" y2="496" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 180° -->
                <line x1="300" y1="548" x2="300" y2="528" stroke="#00FF9C" stroke-width="2.5" stroke-linecap="round"/>
                <!-- 210° -->
                <line x1="176" y1="512" x2="188" y2="496" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 240° -->
                <line x1="108" y1="424" x2="126" y2="412" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 270° -->
                <line x1="52" y1="300" x2="72" y2="300" stroke="#00FF9C" stroke-width="2.5" stroke-linecap="round"/>
                <!-- 300° -->
                <line x1="108" y1="176" x2="126" y2="188" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
                <!-- 330° -->
                <line x1="176" y1="88" x2="188" y2="104" stroke="#00FF9C" stroke-width="2" stroke-linecap="round"/>
              </g>
            </g>

            <!-- Middle Ring + Nodes -->
            <g id="middle-group" class="rotating-reverse">
              <circle cx="300" cy="300" r="175" fill="none" stroke="#00FF9C" stroke-width="1" opacity="0.4"/>
              <!-- 6 Nodes -->
              <circle cx="300" cy="125" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
              <circle cx="451" cy="212" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
              <circle cx="451" cy="388" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
              <circle cx="300" cy="475" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
              <circle cx="149" cy="388" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
              <circle cx="149" cy="212" r="5" fill="none" stroke="#E6D6B0" stroke-width="1.5"/>
            </g>

            <!-- Rotating Scan Line -->
            <g id="scan-group" class="scanning">
              <line x1="300" y1="75" x2="300" y2="525" stroke="#00FF9C" stroke-width="1.25" stroke-linecap="round" opacity="0.22"/>
            </g>

            <!-- Core Transmission Geometry - Satanic Pentagram Sigil -->
            <g id="core-group" filter="url(#core-glow)">
              <!-- Outer Core Ring (subtle containment) -->
              <circle cx="300" cy="300" r="118" fill="none" stroke="#E6D6B0" stroke-width="1.5" opacity="0.45"/>

              <!-- Inverted Satanic Pentagram (main sigil geometry) -->
              <!-- Thick neon star with ritual terminals -->
              <polygon 
                points="300,408  335,205  235,305  365,305  265,205" 
                fill="none" 
                stroke="#00FF9C" 
                stroke-width="7.5" 
                stroke-linejoin="round"
                stroke-linecap="round"
                class="path-draw"/>

              <!-- Inner neon tube highlight for depth/bloom -->
              <polygon 
                points="300,400  330,212  242,302  358,302  270,212" 
                fill="none" 
                stroke="#00FF9C" 
                stroke-width="2.5" 
                stroke-linejoin="round"
                opacity="0.55"/>

              <!-- Five ritual point nodes -->
              <circle cx="300" cy="408" r="7" fill="none" stroke="#E6D6B0" stroke-width="2.25"/>
              <circle cx="335" cy="205" r="7" fill="none" stroke="#E6D6B0" stroke-width="2.25"/>
              <circle cx="235" cy="305" r="7" fill="none" stroke="#E6D6B0" stroke-width="2.25"/>
              <circle cx="365" cy="305" r="7" fill="none" stroke="#E6D6B0" stroke-width="2.25"/>
              <circle cx="265" cy="205" r="7" fill="none" stroke="#E6D6B0" stroke-width="2.25"/>

              <!-- Central receiver eye -->
              <circle cx="300" cy="300" r="24" fill="none" stroke="#00FF9C" stroke-width="3.5"/>
              <circle cx="300" cy="300" r="12" fill="none" stroke="#E6D6B0" stroke-width="1.75" opacity="0.75"/>

              <!-- Vertical mast aligned through pentagram (transmission axis) -->
              <line x1="300" y1="205" x2="300" y2="408" stroke="#00FF9C" stroke-width="4" stroke-linecap="round" opacity="0.28" class="path-draw"/>

              <!-- Frequency crossbars cutting across the star -->
              <line x1="235" y1="278" x2="365" y2="278" stroke="#00FF9C" stroke-width="2.75" stroke-linecap="round"/>
              <line x1="248" y1="338" x2="352" y2="338" stroke="#00FF9C" stroke-width="2.1" stroke-linecap="round"/>

              <!-- Subtle intersection accents -->
              <line x1="258" y1="273" x2="272" y2="260" stroke="#E6D6B0" stroke-width="1.6" stroke-linecap="round"/>
              <line x1="342" y1="273" x2="328" y2="260" stroke="#E6D6B0" stroke-width="1.6" stroke-linecap="round"/>
            </g>

            <!-- Elegant Side Signal Arcs -->
            <g id="side-arcs" opacity="0.35">
              <path d="M95 185 Q55 300 95 415" fill="none" stroke="#E6D6B0" stroke-width="1.5" stroke-linecap="round" class="path-draw"/>
              <path d="M505 185 Q545 300 505 415" fill="none" stroke="#E6D6B0" stroke-width="1.5" stroke-linecap="round" class="path-draw"/>
            </g>
          </svg>
        </div>

        <!-- Wordmark -->
        <h1 class="wordmark" id="wordmark">
          <span class="cross">⛧</span>
          <span class="letters">𝖘6𝖓6𝖋𝖌6𝖉</span>
          <span class="cross">⛧</span>
        </h1>

        <!-- Tagline -->
        <p class="tagline">CORRUPTED GOODS FOR DAMAGED FREQUENCIES</p>
      </div>
    </section>

    <!-- Portals -->
    <section class="portals" id="portals" aria-label="Transmission Portals">
      <div class="portals-grid">
        <!-- Portal 01 -->
        <a href="https://cosmonautavision.tv" class="portal" target="_blank" rel="noopener" aria-label="Violent Icon — Wear the Signal">
          <div class="portal-number">01</div>
          <h2 class="portal-title">VIOLENT ICON</h2>
          <p class="portal-subtitle">Wear the Signal</p>
          <div class="portal-scanline"></div>
        </a>

        <!-- Portal 02 -->
        <a href="https://x.com/cosmonautavhs" class="portal" target="_blank" rel="noopener" aria-label="Cosmonauta Vision — Unauthorized Broadcasts">
          <div class="portal-number">02</div>
          <h2 class="portal-title">COSMONAUTA VISION</h2>
          <p class="portal-subtitle">Unauthorized Broadcasts</p>
          <div class="portal-scanline"></div>
        </a>

        <!-- Portal 03 -->
        <a href="https://github.com/tinnoncent/ikonichaus" class="portal" target="_blank" rel="noopener" aria-label="Ikonic Haus — Build the Impossible">
          <div class="portal-number">03</div>
          <h2 class="portal-title">IKONIC HAUS</h2>
          <p class="portal-subtitle">Build the Impossible</p>
          <div class="portal-scanline"></div>
        </a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
